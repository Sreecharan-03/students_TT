spring.application.name=anurag-tt-portal
spring.config.import=optional:file:./backend/.env[.properties],optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080
server.error.include-message=always

app.jwt.secret=${JWT_SECRET:anuragtt-faculty-portal-super-secret-key-2026-java-stack}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}
